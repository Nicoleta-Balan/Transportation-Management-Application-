version: '3.9'

services:
  # ----------------------------------------------------
  # 1. POSTGRESQL DATABASE SERVICE
  # ----------------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: tms_postgres_db
    environment:
      POSTGRES_DB: tms_db
      POSTGRES_USER: tms_user
      POSTGRES_PASSWORD: tms_password
    ports:
      - "5438:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tms-network
    restart: always

  # ----------------------------------------------------
  # 2. SPRING BOOT APPLICATION SERVICE (BACKEND API)
  # ----------------------------------------------------
  app:
    build: .
    container_name: tms_backend_app
    # Host port 8085 mapped to container port 8080
    ports:
      - "8085:8080"
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/tms_db
      SPRING_DATASOURCE_USERNAME: tms_user
      SPRING_DATASOURCE_PASSWORD: tms_password
      SPRING_JPA_HIBERNATE_DDL_AUTO: create
      SPRING_JPA_SHOW_SQL: "false"
      # Secrets injected from environment variables
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLIC_KEY: ${STRIPE_PUBLIC_KEY}
      JWT_SECRET: ${JWT_SECRET}
      # CORS Configuration - Allow frontend container, localhost, and production domain
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173,https://tmsapp.dev,https://www.tmsapp.dev
    networks:
      - tms-network
    restart: always

  # ----------------------------------------------------
  # 3. REACT FRONTEND SERVICE (VITE + NGINX)
  # ----------------------------------------------------
  frontend:
    build:
      context: ./FrontEnd
      dockerfile: vite-project/Dockerfile
    container_name: tms_frontend_app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Mount entire letsencrypt directory (preserves symlinks)
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - tms-network
    restart: always

volumes:
  postgres_data:

networks:
  tms-network:
    driver: bridge
