version: '3.9'

services:
  # ----------------------------------------------------
  # 1. POSTGRESQL DATABASE SERVICE
  # ----------------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: tms_postgres_db
    environment:
      POSTGRES_DB: tms_db
      POSTGRES_USER: tms_user
      POSTGRES_PASSWORD: gi
    ports:
      - "5438:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tms_user -d tms_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # ----------------------------------------------------
  # 2. SPRING BOOT APPLICATION SERVICE (BACKEND API)
  # ----------------------------------------------------
  app:
    build: .
    container_name: tms_backend_app
    ports:
      - "8085:8085"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/tms_db
      SPRING_DATASOURCE_USERNAME: tms_user
      SPRING_DATASOURCE_PASSWORD: tms_password
    restart: always

  # ----------------------------------------------------
  # 3. REACT FRONTEND SERVICE (VITE + NGINX)
  # ----------------------------------------------------
  frontend:
    image: tms_frontend_image
    build:
      context: ./FrontEnd/vite-project
      dockerfile: Dockerfile
    container_name: tms_frontend_app
    ports:
      - "3000:80"
    depends_on:
      - app
    restart: always

volumes:
  postgres_data:
