version: '3.9'

services:
  # ----------------------------------------------------
  # 1. POSTGRESQL DATABASE SERVICE
  # ----------------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: tms_postgres_db
    environment:
      POSTGRES_DB: tms_db
      POSTGRES_USER: tms_user
      POSTGRES_PASSWORD: gi
    ports:
      - "5438:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Mount database initialization scripts
      # PostgreSQL automatically runs scripts in /docker-entrypoint-initdb.d/ on first startup
      # Scripts are executed in alphabetical order
      - ./database/01_schema_core.sql:/docker-entrypoint-initdb.d/01_schema_core.sql:ro
      - ./database/02_functions_procedures.sql:/docker-entrypoint-initdb.d/02_functions_procedures.sql:ro
      - ./database/03_triggers.sql:/docker-entrypoint-initdb.d/03_triggers.sql:ro
      - ./database/04_init_denormalized.sql:/docker-entrypoint-initdb.d/04_init_denormalized.sql:ro
      - ./database/04_sample_data.sql:/docker-entrypoint-initdb.d/05_sample_data.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tms_user -d tms_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # ----------------------------------------------------
  # 2. SPRING BOOT APPLICATION SERVICE (BACKEND API)
  # ----------------------------------------------------
  app:
    build: .
    container_name: tms_backend_app
    # Host port 8085 mapped to container port 8080
    ports:
      - "8085:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Database connection - using service name 'db' for inter-container communication
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: tms_db
      DB_USER: tms_user
      DB_PASSWORD: gi
      # Spring Boot configuration
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/tms_db
      SPRING_DATASOURCE_USERNAME: tms_user
      SPRING_DATASOURCE_PASSWORD: gi
      # JPA configuration
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_JPA_SHOW_SQL: "false"
    restart: always

  # ----------------------------------------------------
  # 3. REACT FRONTEND SERVICE (VITE + NGINX)
  # ----------------------------------------------------
  frontend:
    image: tms_frontend_image
    build:
      # The build context is the directory containing the Dockerfile and the Frontend folder.
      context: .
      dockerfile: Dockerfile
    container_name: tms_frontend_app
    # Map host port 3000 to the container's NGINX port 80
    ports:
      - "3000:5173"
    # The frontend is static, so it doesn't strictly depend on the backend to start,
    # but it will likely fail to load data without it.
    depends_on:
      - app
    restart: always

volumes:
  postgres_data:
