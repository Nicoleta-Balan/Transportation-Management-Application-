version: '3.9'

services:
  # ----------------------------------------------------
  # 1. POSTGRESQL DATABASE SERVICE
  # ----------------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: tms_postgres_db
    environment:
      POSTGRES_DB: tms_db
      POSTGRES_USER: tms_user
      POSTGRES_PASSWORD: gi
    ports:
      - "5438:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Note: Schema is now auto-generated by JPA/Hibernate
      # Functions and triggers are managed by Flyway migrations (V1-V3)
      # Sample data is initialized via @PostConstruct in DataInitializer.java
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tms_user -d tms_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # ----------------------------------------------------
  # 2. SPRING BOOT APPLICATION SERVICE (BACKEND API)
  # ----------------------------------------------------
  app:
    build: .
    container_name: tms_backend_app
    # Host port 8085 mapped to container port 8080
    ports:
      - "8085:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Database connection - using service name 'db' for inter-container communication
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: tms_db
      DB_USER: tms_user
      DB_PASSWORD: gi
      # Spring Boot configuration
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/tms_db
      SPRING_DATASOURCE_USERNAME: tms_user
      SPRING_DATASOURCE_PASSWORD: gi
      # JPA configuration
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
      # Flyway configuration
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      # Data initialization configuration (Spring Boot converts APP_DATA_INITIALIZE to app.data.initialize)
      APP_DATA_INITIALIZE: "true"
      # Alternative: use Spring Boot property format directly
      SPRING_APPLICATION_JSON: '{"app":{"data":{"initialize":true}}}'
    restart: always

  # ----------------------------------------------------
  # 3. REACT FRONTEND SERVICE (VITE + NGINX)
  # ----------------------------------------------------
  frontend:
    image: tms_frontend_image
    build:
      # The build context is the directory containing the Dockerfile and the Frontend folder.
      context: .
      dockerfile: Dockerfile
    container_name: tms_frontend_app
    # Map host port 3000 to the container's NGINX port 80
    ports:
      - "3000:5173"
    # The frontend is static, so it doesn't strictly depend on the backend to start,
    # but it will likely fail to load data without it.
    depends_on:
      - app
    restart: always

volumes:
  postgres_data:
