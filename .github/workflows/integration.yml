name: Java Docker CI - Ubuntu Runner

on:
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "dev" ]

jobs:
  build-and-deploy:
    runs-on: [self-hosted, Linux, X64, dev]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- STEP TO INSTALL DOCKER COMPOSE ---
      - name: Install Docker Compose
        run: |
          DOCKER_CONFIG=${DOCKER_CONFIG:-$HOME/.docker}
          mkdir -p $DOCKER_CONFIG/cli-plugins
          curl -SL https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64 -o $DOCKER_CONFIG/cli-plugins/docker-compose
          chmod +x $DOCKER_CONFIG/cli-plugins/docker-compose

      - name: Set up Java 22
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '22'

      # Build the Backend JAR artifact (required before Docker can build the 'app' image)
      - name: Build Backend Artifact (Spring Boot/Maven)
        run: mvn -B clean package

      - name: Stop and Remove Existing Stack
        run: docker compose down --timeout 1

      # Build Docker Images for ALL services and Deploy
      # This single command builds the 'app' (using the root Dockerfile)
      # and the 'frontend' (using the root Dockerfile and the Node builder)
      - name: Build Docker Images (Backend & Frontend) and Deploy
        run: docker compose up -d --build

      - name: Clean up old Docker images
        if: always()
        run: |
          echo "Cleaning up dangling Docker images..."
          docker image prune -f