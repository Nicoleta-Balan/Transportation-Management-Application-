name: Java Docker CI - Ubuntu Runner

on:
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "dev" ]

jobs:
  build-and-deploy: # Renamed job for clarity
    runs-on: [self-hosted, Linux, X64, dev]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 22
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '22'

      - name: Build Spring Boot app (Maven)
        run: mvn -B clean package # This step is still essential!

      # --- MODIFIED SECTION START ---

      - name: Stop and remove previous stack (if exists)
        run: docker compose down # Use 'docker compose' (with a space)

      - name: Build and run new stack
        run: docker compose up -d --build # Use 'docker compose' (with a space)

      # --- MODIFIED SECTION END ---

      - name: Clean up old Docker images
        if: always() # This step will run even if previous steps fail
        run: |
          echo "Cleaning up dangling Docker images..."
          docker image prune -f

