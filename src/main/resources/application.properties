server.port=8080
server.servlet.context-path=/

# Overridden by environment variables in Docker
# mvn spring-boot:run for local development (without Docker)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5438/tms_db}
spring.datasource.username=${DB_USERNAME:tms_user}
spring.datasource.password=${DB_PASSWORD:}

spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# JPA/Hibernate Configuration
# update = update schema on startup, validate = only validate
# Overridden by SPRING_JPA_HIBERNATE_DDL_AUTO environment variable in Docker
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.properties.hibernate.hbm2ddl.auto=${DDL_AUTO:update}
# View SQL queries in logs
# Overridden by SPRING_JPA_SHOW_SQL environment variable in Docker
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Naming strategy for database columns
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

logging.level.root=INFO
logging.level.multitier.trans=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
# Exclude Spring Data REST endpoints for non-exported repositories from Swagger
# Spring Data REST uses entity name (pluralized) as default path when no explicit path is set
# Also exclude the profile endpoint (ALPS metadata) - useful for API discovery but not needed in Swagger UI
springdoc.paths-to-exclude=/api/farePolicies/**,/api/routeStops/**,/api/timetableStops/**,/api/profile/**

# Spring Data REST Configuration
# Disable automatic repository exposure (we'll use RepositoryRestController for custom control)
spring.data.rest.base-path=/api
spring.data.rest.default-page-size=20
spring.data.rest.max-page-size=100
# Don't expose repositories automatically - we'll control it via RepositoryRestController
spring.data.rest.detection-strategy=all

spring.jackson.serialization.indent-output=false

spring.jackson.time-zone=UTC
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false

# Stripe Configuration
# Set these via environment variables: STRIPE_SECRET_KEY and STRIPE_PUBLIC_KEY
stripe.secret.key=${STRIPE_SECRET_KEY}
stripe.public.key=${STRIPE_PUBLIC_KEY}

# JWT Configuration
# Set via environment variable: JWT_SECRET (must be at least 32 characters, base64 encoded)
jwt.secret=${JWT_SECRET}
# Token expiration: 2 hours = 7200000 milliseconds
jwt.expiration=7200000
