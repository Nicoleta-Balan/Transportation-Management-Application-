# Spring Boot Application Configuration
spring.application.name=Transportation Management System

# Server Configuration
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5438}/${DB_NAME:tms_db}
spring.datasource.username=${DB_USER:tms_user}
spring.datasource.password=${DB_PASSWORD:gi}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
# Fix for PostgreSQL 15 compatibility - workaround for pg_inherits query issue
# This error occurs because Hibernate queries a column that was removed in PostgreSQL 15
# The workaround: disable the problematic inheritance detection query
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
# Skip schema validation queries that cause issues with PostgreSQL 15
spring.jpa.properties.hibernate.schema_update.unique_constraint_strategy=skip
# Disable automatic schema validation on startup
spring.jpa.properties.hibernate.hbm2ddl.auto=update

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# Database Initialization
# JPA auto-generates schema, Flyway handles migrations for functions/triggers
# Sample data is initialized via @PostConstruct in DataInitializer.java (not via data.sql)
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# Flyway Configuration
# Flyway is disabled - all database schema is managed by JPA/Hibernate
# All validation and integrity checks are handled in the service layer
spring.flyway.enabled=false

# Logging Configuration
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.multitier.trans=DEBUG

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# Error Handling
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false

# JWT Configuration
jwt.secret=your-secret-key-should-be-at-least-256-bits-long-for-HS256-algorithm-to-work-properly-and-securely
jwt.expiration=86400000

# Data Initialization Configuration
# Sample data is initialized using @PostConstruct in DataInitializer.java
# Set to 'false' to disable sample data initialization
app.data.initialize=true

