# Test configuration - uses H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration for tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Spring Data REST Configuration for tests
spring.data.rest.base-path=/api
spring.data.rest.detection-strategy=all
spring.data.rest.default-page-size=20
spring.data.rest.max-page-size=100
# Disable static resource handling to avoid conflicts with @RepositoryRestController
spring.web.resources.add-mappings=false

# Disable Swagger for tests
springdoc.api-docs.enabled=false

# Logging
logging.level.root=WARN
logging.level.multitier.trans=INFO
logging.level.org.springframework.data.rest=WARN

# Stripe Configuration for tests (placeholder values)
stripe.secret.key=sk_test_placeholder
stripe.public.key=pk_test_placeholder

