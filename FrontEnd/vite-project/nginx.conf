server {
    # NGINX listens on port 80 inside the container
    listen 80;
    server_name localhost;

    # Set the root directory for serving files
    root /usr/share/nginx/html;
    index index.html;

    # This is critical for Single Page Applications (SPAs) like Vite builds.
    # It tells NGINX to try to find the requested file,
    # but if it fails (e.g., a direct link like /about),
    # it serves index.html so the client-side router can handle the path.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: Enable Gzip compression for better performance
    gzip on;
    gzip_types text/plain application/javascript text/css application/json image/svg+xml application/xml;
}