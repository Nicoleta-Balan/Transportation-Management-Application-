# --- Stage 1: Build the Application ---
# Use a Node image to install dependencies and build the project
FROM node:20-alpine AS build

# Set the working directory inside the container
WORKDIR /app

# Copy package.json and package-lock.json from the correct path: Frontend/vite-project/
COPY Frontend/vite-project/package*.json ./

# Install dependencies
RUN npm install

# Copy the rest of the application code from Frontend/vite-project/
COPY Frontend/vite-project/ .

# Build the application for production
RUN npm run build

# --- Stage 2: Serve the Application with NGINX ---
# Use a minimal NGINX image to serve the static files
FROM nginx:alpine AS production

# Remove the default NGINX configuration
RUN rm /etc/nginx/conf.d/default.conf

# Copy the custom NGINX configuration file (must be created next to this Dockerfile)
COPY nginx.conf /etc/nginx/conf.d/default.conf

# CRITICAL FIX: Copy the built application files from /app/dist 
# (assuming Vite's default output) into the NGINX serving directory.
COPY --from=build /app/dist /usr/share/nginx/html

# Expose port 80 (the port NGINX is listening on)
EXPOSE 80

# NGINX starts automatically